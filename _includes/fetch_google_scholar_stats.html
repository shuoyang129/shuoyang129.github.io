<script>
(function () {
  function applyCitations(data) {
    var pubs = data && data.publications ? data.publications : {};
    document.querySelectorAll('.show_paper_citations').forEach(function (el) {
      var paperId = el.getAttribute('data-paper-id') || el.getAttribute('data');
      if (!paperId) return;
      try {
        var entry = pubs[paperId];
        if (!entry || typeof entry.num_citations === 'undefined') {
          el.textContent = '| Citations: —';
          return;
        }
        el.textContent = '| Citations: ' + entry.num_citations;
      } catch (e) {
        console.warn('Citation span failed for', paperId, e);
        el.textContent = '| Citations: —';
      }
    });
  }

  function loadJson(url) {
    return fetch(url, { credentials: 'omit' }).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  {% if site.google_scholar_stats_use_cdn %}
  var primaryUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@google-scholar-stats/gs_data.json';
  var fallbackUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json';
  {% else %}
  var primaryUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json';
  var fallbackUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@google-scholar-stats/gs_data.json';
  {% endif %}

  function run() {
    loadJson(primaryUrl)
      .then(applyCitations)
      .catch(function (err) {
        console.warn('Scholar stats primary URL failed, trying fallback:', err);
        return loadJson(fallbackUrl).then(applyCitations);
      })
      .catch(function (err) {
        console.warn('Google Scholar citation data unavailable:', err);
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
